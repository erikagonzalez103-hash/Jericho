<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Jericho — Dion's Operating System</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0d1117;
  --sidebar: #161b22;
  --surface: #1c2128;
  --surface2: #21262d;
  --border: rgba(255,255,255,0.08);
  --border-strong: rgba(255,255,255,0.15);
  --text: #e6edf3;
  --text-muted: #8b949e;
  --text-hint: #484f58;
  --green: #3fb950;
  --green-dim: #1a3d2b;
  --green-text: #3fb950;
  --blue: #58a6ff;
  --blue-dim: #1a2f4a;
  --amber: #d29922;
  --amber-dim: #2d2208;
  --red: #f85149;
  --red-dim: #3d1a1a;
  --purple: #bc8cff;
  --purple-dim: #2d1f4a;
  --radius: 8px;
  --sidebar-w: 220px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  font-size: 14px;
  line-height: 1.5;
}

/* ── SIDEBAR ── */
.sidebar {
  width: var(--sidebar-w);
  min-height: 100vh;
  background: var(--sidebar);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-logo {
  padding: 20px 16px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}

.logo-mark {
  width: 32px; height: 32px;
  background: var(--green);
  border-radius: 6px;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 16px; color: #0d1117;
  flex-shrink: 0;
  letter-spacing: -1px;
}

.logo-text { line-height: 1.2; }
.logo-name { font-size: 15px; font-weight: 700; color: var(--text); letter-spacing: 0.5px; }
.logo-sub { font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

.sidebar-date {
  padding: 10px 16px;
  font-size: 11px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
}

.msg-badge-sidebar {
  background: var(--red);
  color: white;
  font-size: 10px;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 10px;
  display: none;
  margin-left: auto;
}
.msg-badge-sidebar.show { display: inline-block; }

.nav-section {
  padding: 16px 0 4px;
}

.nav-label {
  padding: 0 16px 6px;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-hint);
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 16px;
  font-size: 13px;
  color: var(--text-muted);
  cursor: pointer;
  border: none;
  background: transparent;
  width: 100%;
  text-align: left;
  border-left: 3px solid transparent;
  transition: color 0.15s, background 0.15s;
  position: relative;
}

.nav-item:hover { color: var(--text); background: rgba(255,255,255,0.04); }
.nav-item.active { color: var(--green); border-left-color: var(--green); background: rgba(63,185,80,0.06); }

.nav-icon { font-size: 15px; width: 18px; text-align: center; flex-shrink: 0; }
.nav-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); position: absolute; right: 14px; top: 50%; transform: translateY(-50%); display: none; }
.nav-dot.show { display: block; }

.sidebar-footer {
  margin-top: auto;
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-size: 11px;
  color: var(--text-hint);
}

/* ── MAIN ── */
.main {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: #c0c0c0;
}

.topbar {
  background: var(--sidebar);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 50;
}

.topbar-title { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: -0.3px; }
.topbar-sub { font-size: 12px; color: var(--text-muted); margin-top: 1px; }
.topbar-actions { display: flex; align-items: center; gap: 10px; }

.refresh-btn {
  width: 34px; height: 34px; border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; color: var(--text-muted);
  transition: color 0.15s, background 0.15s;
}
.refresh-btn:hover { color: var(--text); background: var(--surface2); }

.content { padding: 24px; flex: 1; max-width: 900px; }

/* ── SECTION LABELS ── */
.section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: var(--text-hint);
  margin: 24px 0 10px;
}
.section-label:first-child { margin-top: 0; }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
}

.card-header {
  padding: 14px 16px 10px;
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 10px;
}

.card-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; line-height: 1.3; }
.card-sub { font-size: 12px; color: var(--text-muted); margin-top: 3px; }
.card-body { padding: 0 16px 16px; font-size: 13px; color: var(--text-muted); line-height: 1.6; }
.card-divider { height: 1px; background: var(--border); margin: 0 16px; }

/* ── BRIEF CARD ── */
.brief-card {
  background: var(--surface);
  border-radius: var(--radius);
  border: 1px solid var(--border);
  margin-bottom: 12px;
  overflow: hidden;
}
.brief-header {
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
  background: var(--surface2);
}
.brief-avatar {
  width: 36px; height: 36px;
  border-radius: var(--radius);
  background: var(--green);
  color: #0d1117;
  display: flex; align-items: center; justify-content: center;
  font-weight: 800; font-size: 15px;
  flex-shrink: 0;
}
.brief-name { font-size: 13px; font-weight: 600; color: var(--text); }
.brief-time { font-size: 11px; color: var(--text-muted); }
.brief-body {
  padding: 18px 20px;
  font-size: 14px;
  line-height: 1.75;
  color: var(--text);
  white-space: pre-wrap;
}

/* ── BADGES ── */
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 4px;
  letter-spacing: 0.3px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-green { background: var(--green-dim); color: var(--green-text); border: 1px solid rgba(63,185,80,0.2); }
.badge-blue { background: var(--blue-dim); color: var(--blue); border: 1px solid rgba(88,166,255,0.2); }
.badge-amber { background: var(--amber-dim); color: var(--amber); border: 1px solid rgba(210,153,34,0.2); }
.badge-red { background: var(--red-dim); color: var(--red); border: 1px solid rgba(248,81,73,0.2); }
.badge-gray { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
.badge-purple { background: var(--purple-dim); color: var(--purple); border: 1px solid rgba(188,140,255,0.2); }
.option-btn {
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border-strong);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.option-btn:hover { border-color: var(--blue); color: var(--text); }
.option-btn.active { background: var(--blue-dim); border-color: var(--blue); color: var(--blue); font-weight: 600; }

/* ── METRICS GRID ── */
.metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px,1fr)); gap: 10px; margin-bottom: 12px; }
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
}
.metric-label { font-size: 10px; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-hint); margin-bottom: 6px; }
.metric-value { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.metric-value.green { color: var(--green); }
.metric-value.amber { color: var(--amber); }
.metric-value.red { color: var(--red); }
.metric-value.na { font-size: 13px; color: var(--text-hint); font-weight: 400; }
.metric-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; }

/* ── INPUTS ── */
.field-input {
  width: 100%;
  padding: 9px 12px;
  border: 1px solid var(--border-strong);
  border-radius: var(--radius);
  font-size: 13px;
  font-family: inherit;
  background: var(--bg);
  color: var(--text);
  margin-bottom: 8px;
  transition: border-color 0.15s;
}
.field-input:focus { outline: none; border-color: var(--green); }
.field-input::placeholder { color: var(--text-hint); }
textarea.field-input { resize: none; }
select.field-input { appearance: none; cursor: pointer; }

.submit-btn {
  width: 100%;
  padding: 10px;
  background: var(--green);
  color: #0d1117;
  border: none;
  border-radius: var(--radius);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.3px;
  transition: opacity 0.15s;
}
.submit-btn:hover { opacity: 0.9; }
.submit-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ── ACTION ROW ── */
.action-row { display: flex; gap: 8px; padding: 0 16px 14px; }
.action-btn {
  flex: 1;
  padding: 8px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  background: transparent;
  color: var(--text-muted);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  text-align: center;
  transition: color 0.15s, background 0.15s;
}
.action-btn:hover { color: var(--text); background: var(--surface2); }
.action-btn.primary { background: var(--green); color: #0d1117; border-color: var(--green); }
.action-btn.primary:hover { opacity: 0.9; }

/* ── STALE BAR ── */
.stale-bar {
  background: var(--amber-dim);
  border-top: 1px solid rgba(210,153,34,0.2);
  padding: 7px 16px;
  font-size: 11px;
  color: var(--amber);
  display: flex;
  align-items: center;
  gap: 6px;
}
.stale-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--amber); flex-shrink: 0; }

/* ── NOTE PANEL ── */
.note-panel { padding: 12px 16px 14px; border-top: 1px solid var(--border); display: none; }
.note-panel.open { display: block; }
.photo-req { font-size: 11px; color: var(--amber); background: var(--amber-dim); border: 1px solid rgba(210,153,34,0.2); padding: 7px 10px; border-radius: var(--radius); margin-bottom: 8px; }
.photo-btn { width: 100%; padding: 9px; margin: 6px 0; border-radius: var(--radius); border: 1px dashed var(--border-strong); background: transparent; color: var(--text-muted); font-size: 12px; cursor: pointer; text-align: center; }
.photo-btn:hover { border-color: var(--green); color: var(--green); }
.photo-preview { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 8px; }
.photo-thumb { width: 60px; height: 60px; border-radius: var(--radius); object-fit: cover; border: 1px solid var(--border); }

/* ── SCORECARD TABLE ── */
.scorecard-row { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.scorecard-row:last-child { border-bottom: none; }
.scorecard-label { flex: 1; font-size: 12px; color: var(--text-muted); }
.scorecard-input { width: 130px; padding: 6px 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); font-size: 13px; text-align: right; background: var(--bg); color: var(--text); }
.scorecard-input:focus { outline: none; border-color: var(--green); }

/* ── SUB ROWS ── */
.sub-row { display: flex; align-items: center; gap: 12px; padding: 12px 16px; }
.sub-row + .sub-row { border-top: 1px solid var(--border); }
.sub-avatar { width: 38px; height: 38px; border-radius: var(--radius); background: var(--surface2); color: var(--green); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; border: 1px solid var(--border); }
.sub-info { flex: 1; }
.sub-name { font-size: 13px; font-weight: 600; color: var(--text); }
.sub-detail { font-size: 11px; color: var(--text-muted); }
.sub-btn { padding: 6px 14px; border-radius: var(--radius); border: 1px solid var(--border-strong); background: transparent; font-size: 12px; cursor: pointer; color: var(--text-muted); font-weight: 600; }
.sub-btn:hover { color: var(--green); border-color: var(--green); }

/* ── MESSAGES ── */
.msg-card { background: var(--surface); border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 10px; overflow: hidden; }
.msg-card.urgent { border-color: rgba(248,81,73,0.3); background: var(--red-dim); }
.msg-card.unread { border-left: 3px solid var(--blue); }
.msg-hd { padding: 12px 16px 8px; display: flex; align-items: flex-start; gap: 10px; }
.msg-av { width: 34px; height: 34px; border-radius: var(--radius); background: var(--blue-dim); color: var(--blue); display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 12px; flex-shrink: 0; border: 1px solid rgba(88,166,255,0.2); }
.msg-av.urgent { background: var(--red-dim); color: var(--red); border-color: rgba(248,81,73,0.2); }
.msg-meta { flex: 1; }
.msg-subject { font-size: 13px; font-weight: 600; color: var(--text); line-height: 1.3; }
.msg-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
.msg-body { padding: 0 16px 10px; font-size: 13px; color: var(--text-muted); line-height: 1.5; }
.msg-job { padding: 0 16px 10px; }
.msg-pill { display: inline-block; background: var(--surface2); color: var(--text-muted); padding: 2px 10px; border-radius: 4px; font-size: 11px; border: 1px solid var(--border); }

/* ── ROCK ITEMS ── */
.rock-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px 16px; border-bottom: 1px solid var(--border); }
.rock-item:last-child { border-bottom: none; }
.rock-check { width: 18px; height: 18px; border-radius: 4px; border: 1.5px solid var(--border-strong); flex-shrink: 0; margin-top: 1px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 10px; transition: all 0.15s; }
.rock-check.done { background: var(--green); border-color: var(--green); color: #0d1117; font-weight: 700; }
.rock-text { font-size: 13px; color: var(--text); line-height: 1.4; }
.rock-meta { font-size: 11px; color: var(--text-muted); margin-top: 3px; }

/* ── TRAINING ── */
.training-entry { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
.training-entry:last-child { border-bottom: none; }
.training-icon { width: 34px; height: 34px; border-radius: var(--radius); background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 16px; flex-shrink: 0; }
.training-info { flex: 1; }
.training-name { font-size: 13px; font-weight: 600; color: var(--text); }
.training-detail { font-size: 11px; color: var(--text-muted); }

/* ── INJURY FLAGS ── */
.injury-row { display: flex; align-items: flex-start; gap: 10px; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.injury-row:last-child { border-bottom: none; }
.injury-info { flex: 1; font-size: 13px; color: var(--text); }
.injury-sub { font-size: 11px; color: var(--text-muted); margin-top: 2px; line-height: 1.4; }

/* ── RACE CARD ── */
.race-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; border-bottom: 1px solid var(--border); }
.race-row:last-child { border-bottom: none; }
.race-name { font-size: 13px; font-weight: 600; color: var(--text); }
.race-detail { font-size: 11px; color: var(--text-muted); margin-top: 2px; }

/* ── COMING SOON ── */
.coming-soon { text-align: center; padding: 60px 20px; }
.coming-soon-icon { font-size: 48px; margin-bottom: 16px; }
.coming-soon-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.coming-soon-sub { font-size: 13px; color: var(--text-muted); line-height: 1.7; max-width: 380px; margin: 0 auto; }

/* ── MODAL ── */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); width: 100%; max-width: 480px; border-radius: var(--radius) var(--radius) 0 0; padding: 20px; max-height: 80vh; overflow-y: auto; border: 1px solid var(--border); }
.modal-title { font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 4px; }
.modal-sub { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
.modal-close { width: 100%; padding: 10px; margin-top: 10px; border: 1px solid var(--border-strong); border-radius: var(--radius); background: transparent; font-size: 13px; cursor: pointer; color: var(--text-muted); font-weight: 600; }
.modal-close:hover { color: var(--text); }
.status-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
.status-option { padding: 9px 10px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface2); font-size: 12px; cursor: pointer; text-align: center; font-weight: 600; color: var(--text-muted); }
.status-option:hover { border-color: var(--green); color: var(--green); }

/* ── STATES ── */
.loading { text-align: center; padding: 80px 20px; color: var(--text-muted); }
.spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 14px; }
@keyframes spin { to { transform: rotate(360deg); } }
.empty { text-align: center; padding: 40px 20px; color: var(--text-muted); font-size: 13px; }

.toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--surface2); color: var(--text); border: 1px solid var(--border-strong); padding: 10px 20px; border-radius: var(--radius); font-size: 13px; font-weight: 600; opacity: 0; transition: opacity 0.2s; pointer-events: none; white-space: nowrap; z-index: 999; }
.toast.show { opacity: 1; }

/* ── MOBILE ── */
@media (max-width: 768px) {
  :root { --sidebar-w: 200px; }
  .sidebar { transform: translateX(-100%); transition: transform 0.25s; }
  .sidebar.open { transform: translateX(0); }
  .main { margin-left: 0; }
  .topbar { padding: 12px 16px; }
  .content { padding: 16px; }
  .hamburger { display: flex !important; }
  .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 99; }
  .overlay.show { display: block; }
}

@media (min-width: 769px) {
  .hamburger { display: none !important; }
  .sidebar { transform: none !important; }
}

.hamburger {
  display: none;
  width: 34px; height: 34px;
  border-radius: var(--radius);
  border: 1px solid var(--border-strong);
  background: transparent;
  cursor: pointer;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}
.hamburger span { display: block; width: 16px; height: 1.5px; background: var(--text-muted); border-radius: 2px; }

.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 480px) { .two-col { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">J</div>
    <div class="logo-text">
      <div class="logo-name">JERICHO</div>
      <div class="logo-sub">Operating System</div>
    </div>
  </div>
  <div class="sidebar-date" id="sidebar-date">Loading...</div>

  <nav class="nav-section">
    <div class="nav-label">Overview</div>
    <button class="nav-item active" onclick="switchTab('brief')">
      <span class="nav-icon">☀</span> Brief
    </button>
    <button class="nav-item" onclick="switchTab('weekly5')">
      <span class="nav-icon">⚡</span> Weekly 5
      <span class="nav-dot" id="w5-dot"></span>
    </button>
    <button class="nav-item" onclick="switchTab('inbox')">
      <span class="nav-icon">📬</span> Inbox
    </button>
    <button class="nav-item" onclick="switchTab('calendar')">
      <span class="nav-icon">📅</span> Calendar
    </button>
    <button class="nav-item" onclick="switchTab('todos')">
      <span class="nav-icon">✅</span> To-Do
    </button>
  </nav>

  <nav class="nav-section">
    <div class="nav-label">Business</div>
    <button class="nav-item" onclick="switchTab('scoreboard')">
      <span class="nav-icon">📊</span> Scoreboard
    </button>

async function api(path, method='GET', body=null) {
  const opts = {method, headers:{'Content-Type':'application/json'}};
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(WORKER+path, opts);
  return r.json();
}

async function callJericho(userMsg, ctx='') {
  const r = await fetch('https://api.anthropic.com/v1/messages', {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify({
      model:'claude-sonnet-4-20250514', max_tokens:1000,
      system: JOURNAL + (ctx ? '\n\nCURRENT CONTEXT:\n'+ctx : ''),
      messages:[{role:'user',content:userMsg}]
    })
  });
  const data = await r.json();
  return data.content?.[0]?.text || 'Could not reach Jericho right now.';
}

async function generateBrief() {
  const hour = new Date().getHours();
  const isEvening = hour >= 19;
  const day = new Date().toLocaleDateString('en-US',{weekday:'long'});
  const dayNum = new Date().getDay();
  const isSwim = [1,3,5].includes(dayNum);
  const isGym = [2,4].includes(dayNum);
  const sessionType = isSwim ? 'swim morning' : isGym ? 'gym/weights morning' : 'run or bike afternoon';
  const urgentMsgs = unreadMessages.filter(m=>m.priority==='high');
  const jobAlerts = pendingActions.filter(a=>a.forDion);

  // Format calendar events for context
  const calendarSummary = dionCalendar.length
    ? dionCalendar.map(e=>`${e.start}${e.end?' - '+e.end:''}: ${e.subject}${e.location?' @ '+e.location:''}`).join('\n')
    : 'No calendar events found for today';

  // Format field emails for context
  const inboxSummary = dionInbox.length
    ? dionInbox.slice(0,8).map(e=>`FROM: ${e.from} | SUBJECT: ${e.subject} | ${e.isRead?'Read':'UNREAD'}`).join('\n')
    : 'No field-relevant emails in inbox';

  const ctx = `Time: ${new Date().toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'})} · ${day}
Brief type: ${isEvening?'EVENING':'MORNING'}
Today's training: ${sessionType}
Unread messages from Erika/Francisco: ${unreadMessages.length} (${urgentMsgs.length} urgent)
Stale job alerts: ${jobAlerts.length}${jobAlerts.length?' — '+jobAlerts.map(j=>j.name+'('+j.daysSince+'d)').join(', '):''}
Scorecard: ${Object.keys(scorecardData).length>0?JSON.stringify(scorecardData):'none entered yet'}

DION'S OUTLOOK INBOX (field-relevant emails, last 7 days):
${inboxSummary}
Total unread: ${dionUnread}

DION'S CALENDAR TODAY:
${calendarSummary}`;

  const morningPrompt = `Generate Dion's morning brief. Be direct, specific, human — Jericho's voice, Aussie-calibrated roast level 5. Use actual calendar and inbox data in context. Return ONLY valid JSON, no markdown, no extra text:
{"scoreboard_pulse":"1-3 sentences flagging anything off in the business. If nothing flagged say so briefly.","todays_todos":"3-5 specific to-dos, most important first, as a newline-separated list","key_business_actions":"1-3 CEO-level moves for today, not technician tasks. Reference any relevant inbox emails.","training_plan":"Today is ${sessionType} day. Specific session with purpose, target effort, and injury notes for shin splints/groin/S1.","time_blocked_schedule":"Hour-by-hour schedule using ACTUAL calendar events plus training and work blocks. Be realistic.","meal_ideas":"2-3 meal suggestions matching training load. Real food, not a nutrition textbook.","motivating_thing":"One thing to look forward to or a book quote that genuinely fits today. Take the piss if it's earned."}`;

  const eveningPrompt = `Generate Dion's evening brief. Honest, direct — Jericho's voice. Reference calendar events if relevant. Return ONLY valid JSON, no markdown, no extra text:
{"day_review":"Honest take on today. What got done, what didn't. No sugarcoating.","tomorrow_top3":"Tomorrow's top 3 priorities and the very first move of the day.","loose_ends":"Anything unclosed today that'll leak into tomorrow. If nothing, say so.","training_recovery":"Recovery check — what the body needs tonight. Sleep target 8:30pm.","one_learning":"One thing worth logging — decision, mistake, win, or insight. Has he booked his goal-setting session yet? If not, mention it."}`;

  try {
    const text = await callJericho(isEvening ? eveningPrompt : morningPrompt, ctx);
    const clean = text.replace(/```json|```/g,'').trim();
    const sections = JSON.parse(clean);
    renderBrief(sections, isEvening, urgentMsgs, jobAlerts);
  } catch(e) {
    renderBriefFallback(isEvening, urgentMsgs, jobAlerts);
  }
}

function renderBriefFallback(isEvening, urgentMsgs, jobAlerts) {

    scoreboard_pulse: 'Could not generate brief — check connection and refresh.',
    todays_todos: '', key_business_actions: '', training_plan: '',
    time_blocked_schedule: '', meal_ideas: '', motivating_thing: '',
    day_review: 'Could not generate brief — check connection and refresh.',
    tomorrow_top3: '', loose_ends: '', training_recovery: '', one_learning: ''
  }, isEvening, urgentMsgs, jobAlerts);
}

// ── TO-DO ─────────────────────────────────────────────────────────────
let todos = JSON.parse(localStorage.getItem('jericho:todos') || '[]');

function saveTodos() {
  localStorage.setItem('jericho:todos', JSON.stringify(todos));
}

function renderTodos() {
  const open = todos.filter(t => !t.done);
  const done = todos.filter(t => t.done);
  let html = `
    <div class="section-label">To-Do</div>
    <div class="card" style="margin-bottom:10px">
      <div style="padding:12px 16px;display:flex;gap:8px">
        <input class="field-input" type="text" id="todo-input" placeholder="Add a task..." style="margin:0;flex:1" onkeydown="if(event.key==='Enter')addTodo()">
        <button class="action-btn primary" onclick="addTodo()" style="white-space:nowrap">Add</button>
      </div>
    </div>`;

  if (open.length) {
    html += `<div class="card" style="margin-bottom:10px">`;
    open.forEach((t,i) => {
      const idx = todos.indexOf(t);
      html += `<div style="padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)">
        <input type="checkbox" onchange="toggleTodo(${idx})" style="width:16px;height:16px;cursor:pointer;accent-color:var(--green)">
        <div style="flex:1;font-size:13px;color:var(--text)">${esc(t.text)}</div>
        <button onclick="deleteTodo(${idx})" style="background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:16px;padding:0 4px">×</button>
      </div>`;
    });
    html += `</div>`;
  } else {
    html += `<div class="empty" style="margin-bottom:10px">Nothing on the list. Add something above.</div>`;
  }

  if (done.length) {
    html += `<div class="section-label">Done</div><div class="card">`;
    done.slice(0,5).forEach(t => {
      const idx = todos.indexOf(t);
      html += `<div style="padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border);opacity:0.5">
        <input type="checkbox" checked onchange="toggleTodo(${idx})" style="width:16px;height:16px;cursor:pointer;accent-color:var(--green)">
        <div style="flex:1;font-size:13px;color:var(--text);text-decoration:line-through">${esc(t.text)}</div>
        <button onclick="deleteTodo(${idx})" style="background:none;border:none;color:var(--text-hint);cursor:pointer;font-size:16px;padding:0 4px">×</button>
      </div>`;
    });
    html += `<div style="padding:10px 16px;text-align:center"><button class="action-btn" onclick="clearDone()">Clear completed</button></div></div>`;
  }

  document.getElementById('tab-todos').innerHTML = html;
}

function addTodo(text) {
  const input = document.getElementById('todo-input');
  const t = text || (input && input.value.trim());
  if (!t) return;
  todos.unshift({ text: t, done: false, created: Date.now() });
  saveTodos();
  if (input) input.value = '';
  renderTodos();
  if (!text) toast('Task added ✓');
  else toast('Added to To-Do ✓');
}

function toggleTodo(idx) {
  todos[idx].done = !todos[idx].done;
  saveTodos();
  renderTodos();
}

function deleteTodo(idx) {
  todos.splice(idx, 1);
  saveTodos();
  renderTodos();
}

function clearDone() {
  todos = todos.filter(t => !t.done);
  saveTodos();
  renderTodos();
}

async function loadARVendors() {
  const container = document.getElementById('ar-vendors-container');
  if (!container) return;
  try {
    const data = await api('/brief', 'POST', { user:'dion' });
    const payables = data.payables || [];

      container.innerHTML = `<div class="card"><div class="card-body" style="padding:14px;text-align:center;color:var(--text-muted);font-size:13px">No outstanding vendor balances.</div></div>`;
      return;
    }
    const fmt = n => '$' + (parseFloat(n)||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
    const total = payables.reduce((s,p) => s+(parseFloat(p.amount)||0), 0);
    let html = `<div class="card">`;
    payables.forEach(p => {
      const overdue = p.overdue;
      html += `<div class="scorecard-row" style="${overdue?'background:var(--red-dim);':''}">

        <div style="text-align:right">
          <div style="font-size:13px;font-weight:600;color:${overdue?'var(--red)':'var(--text)'}">${fmt(p.amount)}</div>
          ${overdue?'<div style="font-size:10px;color:var(--red);text-transform:uppercase;font-weight:600">Overdue</div>':''}
        </div>

      <div style="font-size:14px;font-weight:700;color:var(--amber)">${fmt(total)}</div>

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div class="empty">Could not load vendor balances.</div>`;
  }

async function generateEmailReply() {
  const emailText = document.getElementById('email-input').value.trim();
  if (!emailText) { toast('Paste an email first'); return; }

  const tone = getSelectedOption('tone-options');
  const length = getSelectedOption('length-options');
  const intent = getSelectedOption('intent-options');
  const keyPoints = document.getElementById('email-points').value.trim();

  const container = document.getElementById('email-reply-container');
  container.innerHTML = `<div class="loading"><div class="spinner"></div><div style="font-size:13px">Jericho is drafting your reply...</div></div>`;

  const toneGuide = {
    'Professional': 'polished, respectful, business-appropriate',
    'Casual': 'friendly, relaxed, conversational — like texting a colleague you know well',
    'Direct': 'clear and to the point, no fluff, get straight to it',
    'Firm': 'strong, assertive, confident and dominant — makes the position clear without being rude'
  };

  const lengthGuide = {
    'Short': '2-4 sentences maximum',
    'Medium': 'a few short paragraphs, covering the key points',
    'Detailed': 'thorough and comprehensive, covering all relevant details'
  };

  const prompt = `You are Jericho, Dion Harrison's personal AI assistant. Dion runs Eridion Glass LLC, a glazing and storefront contractor in Dallas, TX.

Draft a reply to this email on Dion's behalf.

TONE: ${tone} — ${toneGuide[tone]}
LENGTH: ${length} — ${lengthGuide[length]}
INTENT: ${intent}

Always end the reply naturally without a signature — the email client will add one automatically. Never rude, never grovelling.

${keyPoints ? `Key points Dion wants included:\n${keyPoints}\n` : ''}
Incoming email:
${emailText}

Return ONLY the email reply text. No subject line, no preamble, no explanation.`;

  try {
    const resp = await fetch('https://frosty-base-f01e.erikagonzalez103.workers.dev/api/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 800,
        messages: [{ role: 'user', content: prompt }]
      })
    });
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'Could not generate reply.';

    const replyId = 'generated-reply';
    container.innerHTML = `
      <div class="section-label">Generated reply</div>
      <div class="card">
        <div style="padding:10px 16px 6px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)">
          <span class="badge badge-blue">${tone}</span>
          <span class="badge badge-gray">${length}</span>
          <span class="badge badge-amber">${intent}</span>
        </div>
        <div style="padding:12px 16px 6px">

        </div>
        <div class="action-row">
          <button class="action-btn" onclick="generateEmailReply()">Regenerate</button>
          <button class="action-btn" onclick="copyDraft('${replyId}')">Copy</button>
          <button class="action-btn primary" onclick="openEmailReply()">Open in Mail</button>
        </div>
      </div>`;
  } catch(e) {
    container.innerHTML = `<div class="empty">Could not generate reply — check connection and try again.</div>`;
  }
}

          <div style="font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;color:var(--text-hint);margin-bottom:6px">Body</div>
          <textarea class="field-input" rows="12" style="font-size:12px;font-family:monospace" id="${draftId}">${esc(draft.body)}</textarea>
        </div>
        <div class="action-row">
          <button class="action-btn" onclick="copyDraft('${draftId}')">Copy email</button>
          <button class="action-btn primary" onclick="openMailto('${esc(draft.pmEmail)}','${esc(draft.subject)}','${draftId}')">Open in mail</button>
        </div>
      </div>`;
    });

    container.innerHTML = html;
  } catch(e) {
    container.innerHTML = `<div class="empty">Could not load email drafts. Check connection and try again.</div>`;
  }
}

function copyDraft(inputId) {
  const el = document.getElementById(inputId);
  if (!el) return;
  el.select();
  document.execCommand('copy');
  toast('Email copied to clipboard ✓');
}

function openMailto(email, subject, bodyInputId) {
  const bodyEl = document.getElementById(bodyInputId);
  const body = bodyEl ? bodyEl.value : '';
  const mailto = `mailto:${encodeURIComponent(email)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
  window.location.href = mailto;
}

function renderMessages() {
  let html='';
  if (unreadMessages.length) {
    html+=`<div class="section-label">From Erika — ${unreadMessages.length} unread</div>`;
    unreadMessages.forEach(m=>{
      const isUrgent=m.priority==='high';
      html+=`<div class="msg-card ${isUrgent?'urgent':'unread'}" id="msg-${esc(m.id)}">
        <div class="msg-hd">
          <div class="msg-av ${isUrgent?'urgent':''}">EG</div>
          <div class="msg-meta"><div class="msg-subject">${esc(m.subject)}</div><div class="msg-detail">${esc(m.type)}${isUrgent?' · URGENT':''}</div></div>
          ${isUrgent?'<span class="badge badge-red">Urgent</span>':'<span class="badge badge-blue">New</span>'}
        </div>
        <div class="msg-body">${esc(m.body||'')}</div>
        ${m.jobRef?`<div class="msg-job"><span class="msg-pill">Job #${esc(m.jobRef)}${m.builder?' · '+esc(m.builder):''}${m.address?' · '+esc(m.address):''}</span></div>`:''}
        <div class="action-row">
          <button class="action-btn" onclick="markRead('${esc(m.id)}')">Mark read</button>
          <button class="action-btn primary" onclick="prefillHandoff('${esc(m.jobRef||'')}','${esc(m.builder||'')}','${esc(m.address||'')}')">Reply</button>
        </div>
      </div>`;
    });
  } else {
    html+=`<div class="empty">No new messages from Erika.</div>`;
  }
  html+=`<div class="section-label">Send update to Erika</div>
    <div class="card">
      <div class="card-body" style="padding-top:14px">
        <select class="field-input" id="handoff-type">
          <option value="">Type of update...</option>
          ${HANDOFF_TYPES.map(t=>`<option value="${t.value}">${t.label}</option>`).join('')}
        </select>
        <input class="field-input" type="text" id="handoff-job" placeholder="Job # (Smart Glazier)">
        <input class="field-input" type="text" id="handoff-builder" placeholder="Builder name">
        <input class="field-input" type="text" id="handoff-address" placeholder="Job address">
        <textarea class="field-input" id="handoff-body" placeholder="Details for Erika..." rows="3"></textarea>
        <button class="submit-btn" onclick="sendHandoff()">Send to Erika</button>
      </div>
    </div>`;
  document.getElementById('tab-messages').innerHTML=html;
}

async function markRead(msgId) {
  try {
    await api(`/handoff/mark-read/${msgId}`,'POST');
    unreadMessages=unreadMessages.filter(m=>m.id!==msgId);
    updateMsgBadge(unreadMessages.length);
    const el=document.getElementById('msg-'+msgId);
    if (el) el.style.opacity='0.4';
    toast('Marked as read');
  } catch(e) { toast('Could not mark read'); }
}

async function sendHandoff() {
  const type=document.getElementById('handoff-type').value;
  const jobRef=document.getElementById('handoff-job').value.trim();
  const builder=document.getElementById('handoff-builder').value.trim();
  const address=document.getElementById('handoff-address').value.trim();
  const body=document.getElementById('handoff-body').value.trim();
  if (!type||!body) { toast('Select a type and add details'); return; }
  const label=HANDOFF_TYPES.find(t=>t.value===type)?.label||type;
  try {
    await api('/handoff/create','POST',{from:'biff',to:'francisco',type,
      priority:['SITE_ISSUE','MATERIAL_PROBLEM'].includes(type)?'high':'normal',
      subject:address?`${label} — ${address}`:label, body, jobRef, builder, address});
    ['handoff-type','handoff-job','handoff-builder','handoff-address','handoff-body'].forEach(id=>{const el=document.getElementById(id);if(el)el.value='';});
    toast('Sent to Erika ✓');
  } catch(e) { toast('Could not send'); }
}

function prefillHandoff(jobRef,builder,address) {
  setTimeout(()=>{
    if(jobRef)document.getElementById('handoff-job').value=jobRef;
    if(builder)document.getElementById('handoff-builder').value=builder;
    if(address)document.getElementById('handoff-address').value=address;
  },100);
}

function prefillSub(sub) {
  document.getElementById('sub-select').value=sub;
  setTimeout(()=>document.getElementById('sub-job').focus(),100);
}

function openStatusModal(jobId,boardId,jobName) {
  modalJobId=jobId; modalBoardId=boardId;
  document.getElementById('modal-job-name').textContent=jobName;
  document.getElementById('modal-status-grid').innerHTML=MONDAY_STATUSES.map(s=>`<button class="status-option" onclick="selectStatus('${esc(s)}')">${esc(s)}</button>`).join('');
  document.getElementById('status-modal').classList.add('open');
}

function closeModal() { document.getElementById('status-modal').classList.remove('open'); modalJobId=null; modalBoardId=null; }

async function selectStatus(status) {
  if (!modalJobId) return;
  const id=modalJobId; closeModal();
  const panel=document.getElementById('note-panel-'+id);
  if (panel) {
    panel.classList.add('open');
    const ta=document.getElementById('note-text-'+id);
    if (ta) ta.dataset.pendingStatus=status;
    toast('Add photo + note to confirm');
    return;
  }
  await pushStatus(id,modalBoardId,status);
}

async function pushStatus(jobId,boardId,status) {
  toast('Updating...');
  try {
    await api('/job-status','POST',{jobId,lane:'operations',status,updatedBy:'dion'});
    // Auto-handoff to Francisco when installed & complete
    if (status === 'Installed & Complete') {
      const job = allJobs.find(j=>j.id===jobId);
      await api('/handoff/create','POST',{
        from:'biff', to:'francisco', type:'VISIT_COMPLETE', priority:'normal',
        subject:`Job complete — ${job?.name||jobId} · Ready to invoice`,
        body:`Dion marked "${job?.name||jobId}" as Installed & Complete. Invoice can now be generated. Builder: ${job?.builder||'unknown'}.`,
        jobRef:jobId, builder:job?.builder||'', address:job?.name||jobId
      }).catch(()=>{});
      toast('Updated ✓ — Erika notified to invoice 📧');
    } else {
      toast('Updated ✓');
    }
    loadAll();
  } catch(e) { toast('Could not update'); }
}

function openNotePanel(jobId) { const p=document.getElementById('note-panel-'+jobId); if(p) p.classList.toggle('open'); }

function triggerPhoto(jobId) { const i=document.getElementById('photo-input'); i.dataset.jobId=jobId; i.click(); }

document.getElementById('photo-input').addEventListener('change',function(e){
  const jobId=this.dataset.jobId;
  const preview=document.getElementById('photos-'+jobId);
  if (!preview) return;
  Array.from(e.target.files).forEach(file=>{
    pendingPhotos.push({jobId,file});
    const img=document.createElement('img');
    img.className='photo-thumb';
    img.src=URL.createObjectURL(file);
    preview.appendChild(img);
  });
});

async function submitNote(jobId) {
  const ta=document.getElementById('note-text-'+jobId);
  const text=ta?.value?.trim();
  const photos=pendingPhotos.filter(p=>p.jobId===jobId);
  const pendingStatus=ta?.dataset?.pendingStatus;
  if (!text&&!photos.length) { toast('Add a note or photo first'); return; }
  const btn=document.getElementById('note-submit-'+jobId);
  btn.disabled=true; btn.textContent='Saving...';
  try {
    await api('/note','POST',{jobId,from:'dion',message:text||'(photo attached)'});
    if (pendingStatus) await pushStatus(jobId,'4072242499',pendingStatus);
    pendingPhotos=pendingPhotos.filter(p=>p.jobId!==jobId);
    document.getElementById('note-panel-'+jobId).classList.remove('open');
    toast('Saved ✓');
  } catch(e) { toast('Could not save'); }
  finally { btn.disabled=false; btn.textContent='Save note'; }
}

async function submitQuickNote() {
  const jobId=document.getElementById('quick-job')?.value?.trim();
  const note=document.getElementById('quick-note')?.value?.trim();
  if (!jobId||!note) { toast('Enter job and note'); return; }
  try { await api('/note','POST',{jobId,from:'dion',message:note}); document.getElementById('quick-job').value=''; document.getElementById('quick-note').value=''; toast('Logged ✓'); }
  catch(e) { toast('Could not save'); }
}

async function dismissAction(id) {
  try { await api('/actions/dismiss','POST',{actionId:id}); pendingActions=pendingActions.filter(a=>a.id!==id); toast('Dismissed'); }
  catch(e) { toast('Could not dismiss'); }
}

async function sendSubReminder() {
  const sub=document.getElementById('sub-select').value;
  const job=document.getElementById('sub-job').value.trim();
  const dt=document.getElementById('sub-dt').value.trim();
  if (!sub||!job||!dt) { toast('Fill in all fields'); return; }
  await api('/note','POST',{jobId:job,from:'dion',message:`Reminder for ${sub}: on site at ${job} — ${dt}`});
  toast('Logged ✓');
  document.getElementById('sub-job').value=''; document.getElementById('sub-dt').value='';
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }

// ── WEEKLY 5 ──────────────────────────────────────────────────────────

const W5_CATEGORIES = [
  { id:'strategy',   icon:'🎯', label:'Goals & Strategy',      color:'badge-purple' },
  { id:'learning',   icon:'📚', label:'Learning',               color:'badge-blue'   },
  { id:'relations',  icon:'🤝', label:'Relationships',          color:'badge-green'  },
  { id:'system',     icon:'⚙',  label:'Business System',        color:'badge-amber'  },
  { id:'mindset',    icon:'🧠', label:'Leadership & Mindset',   color:'badge-gray'   },
];

function getWeekOf() {
  const d = new Date();
  const day = d.getDay();
  const monday = new Date(d);
  monday.setDate(d.getDate() - (day === 0 ? 6 : day - 1));
  return monday.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}

function isMonday() { return new Date().getDay() === 1; }

function loadW5State() {
  try {
    const saved = localStorage.getItem('jericho_w5');
    if (saved) {
      const parsed = JSON.parse(saved);
      weekly5Data = parsed;
    }
  } catch(e) {}
}

function saveW5State() {
  try { localStorage.setItem('jericho_w5', JSON.stringify(weekly5Data)); } catch(e) {}
}

async function generateWeekly5() {
  const weekOf = getWeekOf();
  const lastPick = weekly5Data.history.slice(-1)[0];
  const lastCategory = lastPick ? lastPick.category : 'none';
  const streak = weekly5Data.streak || 0;

  const ctx = `Today is ${new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})}.
Week of: ${weekOf}
Current streak: ${streak} weeks completed
Last week's pick: ${lastPick ? lastPick.title + ' (category: '+lastPick.category+')' : 'none — first week'}
Last week outcome: ${lastPick ? (lastPick.completed ? 'Completed. Note: '+lastPick.note : 'Not completed. Reason: '+lastPick.note) : 'N/A'}
Current business situation: Eridion 2.0 push, slow April, pipeline needs work, 90% builder dependency risk.
Training phase: Post-marathon, building toward Alcatraz June 2026.
Goals status: Not yet written down — goal-setting session still needed.
Eridion differentiator: Still unresolved — needs answering.`;

  const prompt = `Generate this week's Weekly 5 growth items for Dion. One item per category. Make them specific, actionable, and context-aware based on where he is right now.

Categories and what each should contain:
1. GOALS & STRATEGY — something that moves Eridion 2.0 forward or addresses the differentiator question or pipeline risk
2. LEARNING — one of: a book chapter/section to read, a podcast episode (business/glazing/endurance), a TED talk, OR a trade learning (storefront systems, glass types, curtain wall, installation techniques, new products, industry trends) — vary it week to week
3. RELATIONSHIPS — a specific relationship action: builder lunch, designer outreach, referral partner call, sub check-in, or new contact
4. BUSINESS SYSTEM — one process, tool, or habit to build or improve: scorecards, SOPs, pricing review, Monday.com cleanup, etc.
5. LEADERSHIP & MINDSET — a Stoic practice, framework to apply, self-reflection exercise, or leadership habit

For each item return:
- title (short, punchy, max 8 words)
- why (1-2 sentences — why THIS week, why THIS matters for Dion specifically)
- action (specific what-to-do, max 2 sentences)
- time (realistic time commitment e.g. "30 mins", "1 lunch", "15 mins daily")
- category (one of: strategy, learning, relations, system, mindset)

Return ONLY valid JSON array with 5 objects, no markdown:
[{"title":"...","why":"...","action":"...","time":"...","category":"..."}]`;

  try {
    const text = await callJericho(prompt, ctx);
    const clean = text.replace(/```json|```/g,'').trim();
    const cards = JSON.parse(clean);
    weekly5Data.cards = cards;
    weekly5Data.weekOf = weekOf;
    weekly5Data.pickedIndex = null;
    saveW5State();
    renderWeekly5();
  } catch(e) {
    document.getElementById('tab-weekly5').innerHTML = `<div class="empty">Could not generate Weekly 5. Check connection and try again.</div>
      <div style="text-align:center;padding-bottom:20px"><button class="submit-btn" style="max-width:200px;margin:0 auto;display:block" onclick="generateWeekly5()">Try again</button></div>`;
  }
}

function pickCard(index) {
  weekly5Data.pickedIndex = index;
  saveW5State();
  renderWeekly5();
  toast('Focus locked in 🎯 Go get it.');
}

function markW5Complete(completed) {
  const modal = document.getElementById('w5-checkin-modal');
  if (modal) modal.classList.add('open');
  document.getElementById('w5-complete-flag').value = completed ? '1' : '0';
}

function submitW5Checkin() {
  const completed = document.getElementById('w5-complete-flag').value === '1';
  const note = document.getElementById('w5-note-input').value.trim();
  const picked = weekly5Data.cards[weekly5Data.pickedIndex];
  if (!picked) return;

  weekly5Data.history.push({
    weekOf: weekly5Data.weekOf,
    title: picked.title,
    category: picked.category,
    completed,
    note: note || (completed ? 'Done.' : 'Did not complete.'),
    completedAt: new Date().toISOString()
  });

  if (completed) {
    weekly5Data.streak = (weekly5Data.streak || 0) + 1;
  } else {
    weekly5Data.streak = 0;
  }

  weekly5Data.cards = [];
  weekly5Data.pickedIndex = null;
  saveW5State();

  document.getElementById('w5-checkin-modal').classList.remove('open');
  document.getElementById('w5-note-input').value = '';
  toast(completed ? 'Week complete 🔥 Streak: ' + weekly5Data.streak : 'Logged. No streak, but showing up is step one.');
  renderWeekly5();
}

function renderWeekly5() {
  loadW5State();
  const weekOf = getWeekOf();
  const hasCards = weekly5Data.cards && weekly5Data.cards.length === 5;
  const isCurrentWeek = weekly5Data.weekOf === weekOf;
  const streak = weekly5Data.streak || 0;
  const hasPick = weekly5Data.pickedIndex !== null && weekly5Data.pickedIndex !== undefined;
  const picked = hasPick ? weekly5Data.cards[weekly5Data.pickedIndex] : null;

  let html = '';

  // Streak bar
  html += `<div class="section-label">Weekly growth focus</div>
    <div style="display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px 16px;margin-bottom:12px">
      <div>
        <div style="font-size:13px;font-weight:600;color:var(--text)">Week of ${weekOf}</div>
        <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${streak > 0 ? '🔥 '+streak+' week streak' : 'No streak yet — start this week'}</div>
      </div>
      <div style="text-align:right">
        <div style="font-size:22px;font-weight:700;color:var(--green)">${streak}</div>
        <div style="font-size:10px;color:var(--text-hint);letter-spacing:0.5px;text-transform:uppercase">Streak</div>
      </div>
    </div>`;

  // Active pick banner
  if (hasPick && picked && isCurrentWeek) {
    const cat = W5_CATEGORIES.find(c=>c.id===picked.category);
    html += `<div class="section-label">This week's focus</div>
      <div style="background:var(--green-dim);border:1px solid rgba(63,185,80,0.25);border-radius:var(--radius);padding:16px;margin-bottom:12px">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <span style="font-size:20px">${cat?.icon||'🎯'}</span>
          <span class="badge ${cat?.color||'badge-green'}" style="font-size:10px">${cat?.label||picked.category}</span>
          <span style="font-size:11px;color:var(--green);margin-left:auto">● Active</span>
        </div>
        <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px">${esc(picked.title)}</div>
        <div style="font-size:13px;color:var(--text-muted);margin-bottom:8px;line-height:1.5">${esc(picked.action)}</div>
        <div style="font-size:11px;color:var(--text-hint)">⏱ ${esc(picked.time)}</div>
        <div style="display:flex;gap:8px;margin-top:14px">
          <button class="action-btn" onclick="markW5Complete(false)" style="flex:1">Didn't get to it</button>
          <button class="action-btn primary" onclick="markW5Complete(true)" style="flex:1">Done ✓</button>
        </div>
      </div>`;
  }

  // Generate or regenerate
  if (!hasCards || !isCurrentWeek) {
    html += `<div class="card">
      <div class="card-body" style="padding-top:20px;text-align:center;padding-bottom:24px">
        <div style="font-size:36px;margin-bottom:12px">⚡</div>
        <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:8px">${isCurrentWeek && !hasCards ? 'Ready to generate' : 'New week, new 5'}</div>
        <div style="font-size:13px;color:var(--text-muted);line-height:1.6;margin-bottom:18px">Jericho picks 5 context-aware growth actions — one from each lane. You pick one. That's your focus for the week.</div>
        <button class="submit-btn" style="max-width:260px;margin:0 auto;display:block" onclick="generateWeekly5Loading()">Generate my Weekly 5</button>
      </div>
    </div>`;
  } else {
    // Show all 5 cards
    html += `<div class="section-label">${hasPick ? 'All 5 — grab another anytime' : 'Pick your focus for the week'}</div>`;
    weekly5Data.cards.forEach((card, i) => {
      const cat = W5_CATEGORIES.find(c=>c.id===card.category);
      const isPicked = weekly5Data.pickedIndex === i;
      html += `<div class="card" style="${isPicked?'opacity:0.5;':''}">
        <div class="card-header">
          <div style="flex:1;min-width:0">
            <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
              <span style="font-size:16px">${cat?.icon||'📌'}</span>
              <span class="badge ${cat?.color||'badge-gray'}">${cat?.label||card.category}</span>
              <span style="font-size:11px;color:var(--text-hint);margin-left:auto">⏱ ${esc(card.time)}</span>
            </div>
            <div class="card-title">${esc(card.title)}</div>
            <div class="card-sub" style="margin-top:4px">${esc(card.why)}</div>
          </div>
        </div>
        <div class="card-body" style="padding-top:0;font-size:13px;color:var(--text-muted);line-height:1.5;margin-bottom:8px">${esc(card.action)}</div>
        ${!isPicked ? `<div class="action-row"><button class="action-btn primary" style="flex:1" onclick="pickCard(${i})">Pick this one 🎯</button></div>` : `<div style="padding:0 16px 14px;font-size:12px;color:var(--green)">✓ This is your current focus</div>`}
      </div>`;
    });

    // Regenerate option
    html += `<div style="text-align:center;padding:8px 0 20px">
      <button style="background:none;border:none;color:var(--text-hint);font-size:12px;cursor:pointer" onclick="generateWeekly5Loading()">↻ Regenerate this week's 5</button>
    </div>`;
  }

  // History
  if (weekly5Data.history && weekly5Data.history.length) {
    html += `<div class="section-label">History</div><div class="card">`;
    weekly5Data.history.slice(-5).reverse().forEach(h => {
      html += `<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border)">
        <span style="font-size:16px;margin-top:1px">${h.completed?'✅':'❌'}</span>
        <div style="flex:1">
          <div style="font-size:13px;font-weight:600;color:var(--text)">${esc(h.title)}</div>
          <div style="font-size:11px;color:var(--text-muted);margin-top:2px">${esc(h.weekOf)} · ${h.completed?'Completed':'Not completed'}</div>
          ${h.note && h.note !== 'Done.' && h.note !== 'Did not complete.' ? `<div style="font-size:12px;color:var(--text-hint);margin-top:3px;font-style:italic">"${esc(h.note)}"</div>` : ''}
        </div>
      </div>`;
    });
    html += `<div style="height:1px"></div></div>`;
  }

  document.getElementById('tab-weekly5').innerHTML = html;

  // Show dot if no pick yet and cards exist
  const dot = document.getElementById('w5-dot');
  if (dot) dot.classList.toggle('show', hasCards && isCurrentWeek && !hasPick);
}

async function generateWeekly5Loading() {
  document.getElementById('tab-weekly5').innerHTML = `<div class="loading"><div class="spinner"></div><div style="font-size:13px">Jericho is building your week...</div></div>`;
  await generateWeekly5();
}

document.getElementById('sidebar-date').textContent=today();
loadAll();
renderWeekly5();
</script>
